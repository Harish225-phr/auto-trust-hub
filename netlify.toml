[build]
  command = "bun run build"
  functions = "api"
  publish = "dist/client"

[[redirects]]
  from = "/((?!assets/|favicon\\.ico|robots\\.txt|sitemap\\.xml|.*\\.[a-zA-Z0-9]+$).*)"
  to = "/.netlify/functions/ssr"
  status = 200

[[redirects]]
  from = "/"
  to = "/.netlify/functions/ssr"
  status = 200
